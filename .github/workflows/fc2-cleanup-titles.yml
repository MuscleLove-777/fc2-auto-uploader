name: FC2 Cleanup Titles (one-shot)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dump=本文確認 / meta=メタ情報 / republish=再公開 / 空=実際に修正"
        required: false
        default: ""
      republish_id:
        description: "republishモード時の対象post id"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run cleanup
        env:
          FC2_BLOG_ID: ${{ secrets.FC2_BLOG_ID }}
          FC2_USERNAME: ${{ secrets.FC2_USERNAME }}
          FC2_PASSWORD: ${{ secrets.FC2_PASSWORD }}
          CLEANUP_MODE: ${{ inputs.mode }}
          REPUBLISH_ID: ${{ inputs.republish_id }}
        run: python cleanup_titles.py
