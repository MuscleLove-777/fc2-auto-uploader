name: FC2 Blog Auto Post

on:
  schedule:
    # Wave6-C 頻度UP (規約配慮で間隔分散、ameblo UTC 3/9/13 とは衝突なし)
    - cron: '0 6 * * *'  # JST 15:00
    - cron: '0 12 * * *'  # JST 21:00
    - cron: '0 18 * * *'  # JST 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run upload (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          FC2_BLOG_ID: ${{ secrets.FC2_BLOG_ID }}
          FC2_USERNAME: ${{ secrets.FC2_USERNAME }}
          FC2_PASSWORD: ${{ secrets.FC2_PASSWORD }}
          GDRIVE_FOLDER_ID_FC2: ${{ secrets.GDRIVE_FOLDER_ID_FC2 }}
        run: python upload.py

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed. Waiting 60s before retry..."
          sleep 60

      - name: Run upload (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          FC2_BLOG_ID: ${{ secrets.FC2_BLOG_ID }}
          FC2_USERNAME: ${{ secrets.FC2_USERNAME }}
          FC2_PASSWORD: ${{ secrets.FC2_PASSWORD }}
          GDRIVE_FOLDER_ID_FC2: ${{ secrets.GDRIVE_FOLDER_ID_FC2 }}
        run: python upload.py

      - name: Wait before retry 3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: |
          echo "Attempt 2 failed. Waiting 120s before retry..."
          sleep 120

      - name: Run upload (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        continue-on-error: true
        env:
          FC2_BLOG_ID: ${{ secrets.FC2_BLOG_ID }}
          FC2_USERNAME: ${{ secrets.FC2_USERNAME }}
          FC2_PASSWORD: ${{ secrets.FC2_PASSWORD }}
          GDRIVE_FOLDER_ID_FC2: ${{ secrets.GDRIVE_FOLDER_ID_FC2 }}
        run: python upload.py

      - name: Commit upload log
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_fc2.json
          git diff --staged --quiet || git commit -m "Update uploaded_fc2.json"
          git push

      - name: Determine result
        id: result
        run: |
          if [ "${{ steps.attempt1.outcome }}" = "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "attempts=1" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.attempt2.outcome }}" = "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "attempts=2" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.attempt3.outcome }}" = "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "attempts=3" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "attempts=3" >> "$GITHUB_OUTPUT"
          fi

      - name: LINE notify on failure
        if: steps.result.outputs.success == 'false'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ FC2ブログ自動投稿が3回リトライしても失敗しました\n\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\nログ: https://github.com/MuscleLove-777/fc2-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.result.outputs.success == 'true'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          ATTEMPTS=${{ steps.result.outputs.attempts }}
          if [ "$ATTEMPTS" = "1" ]; then
            RETRY_INFO="（1回目で成功）"
          else
            RETRY_INFO="（${ATTEMPTS}回目のリトライで成功）"
          fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ FC2ブログ自動投稿が完了しました${RETRY_INFO}\n\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\nログ: https://github.com/MuscleLove-777/fc2-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"
